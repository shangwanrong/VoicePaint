<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoicePaint - AI 语音绘图工具</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏 -->
    <header id="header">
      <h1>VoicePaint</h1>
      <span id="voice-status" class="status-indicator" title="语音识别状态">
        <span class="status-dot"></span>
        <span class="status-text">未启动</span>
      </span>
    </header>

    <!-- 主画布区域 -->
    <main id="canvas-container">
      <canvas id="paint-canvas"></canvas>
      <!-- 画笔光标指示器 -->
      <div id="cursor-indicator" class="cursor-indicator"></div>
    </main>

    <!-- 底部状态栏 -->
    <footer id="status-bar">
      <div class="status-group">
        <span class="status-label">颜色:</span>
        <span id="current-color" class="color-preview" style="background-color: #000000;"></span>
        <span id="color-text">#000000</span>
      </div>
      <div class="status-group">
        <span class="status-label">线宽:</span>
        <span id="current-linewidth">2</span>
      </div>
      <div class="status-group">
        <span class="status-label">模式:</span>
        <span id="current-mode">描边</span>
      </div>
      <div class="status-group">
        <span class="status-label">位置:</span>
        <span id="current-position">中心</span>
      </div>
    </footer>

    <!-- 语音识别结果显示 -->
    <div id="speech-overlay" class="speech-overlay hidden">
      <div class="speech-content">
        <div class="speech-icon">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </div>
        <div id="speech-text" class="speech-text">等待语音输入...</div>
      </div>
    </div>

    <!-- 文字输入回退（语音不可用时显示） -->
    <div id="text-input-bar" class="text-input-bar hidden">
      <input type="text" id="text-command-input" placeholder="输入指令，如：画一个红色的圆" autocomplete="off" />
      <button id="text-command-send" class="text-send-btn">发送</button>
    </div>

    <!-- 启动按钮（首次需要用户交互才能启动语音识别） -->
    <div id="start-overlay" class="start-overlay">
      <div class="start-content">
        <h2>VoicePaint</h2>
        <p>AI 语音绘图工具</p>
        <p class="start-hint">选择输入模式启动</p>
        <div class="start-buttons">
          <button id="start-voice-btn" class="start-btn">语音模式</button>
          <button id="start-text-btn" class="start-btn start-btn-secondary">文字模式</button>
        </div>
        <p class="start-note">语音模式使用讯飞语音听写（需配置API密钥）<br>文字模式无需麦克风，手动输入指令</p>
      </div>
    </div>

    <!-- 讯飞配置面板 -->
    <div id="xfyun-settings" class="settings-overlay hidden">
      <div class="settings-content">
        <h3>讯飞语音听写配置</h3>
        <p class="settings-desc">请前往 <a href="https://www.xfyun.cn/services/voicedictation" target="_blank">讯飞开放平台</a> 注册并创建"语音听写"应用，获取以下密钥（免费额度每天500次）</p>
        <div class="settings-form">
          <div class="form-group">
            <label for="xfyun-appid">APPID</label>
            <input type="text" id="xfyun-appid" placeholder="如: 5a123456" />
          </div>
          <div class="form-group">
            <label for="xfyun-apikey">APIKey</label>
            <input type="text" id="xfyun-apikey" placeholder="如: a1b2c3d4e5f6..." />
          </div>
          <div class="form-group">
            <label for="xfyun-apisecret">APISecret</label>
            <input type="text" id="xfyun-apisecret" placeholder="如: 1a2b3c4d5e6f..." />
          </div>
        </div>
        <div class="settings-actions">
          <button id="xfyun-save-btn" class="start-btn">保存并启动</button>
          <button id="xfyun-cancel-btn" class="start-btn start-btn-secondary">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/action-history.js"></script>
  <script src="js/shape-factory.js"></script>
  <script src="js/canvas-renderer.js"></script>
  <script src="js/voice-recognizer.js"></script>
  <script src="js/xfyun-recognizer.js"></script>
  <script src="js/command-parser.js"></script>
  <script src="js/command-executor.js"></script>
  <script src="js/feedback-system.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
